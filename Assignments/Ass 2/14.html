<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14. Pricing Table UI</title>
    <style>
body {
    font-family: Arial;
}

.pricing {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 50px;
}

.card {
    border: 1px solid #ddd;
    padding: 20px;
    text-align: center;
    border-radius: 10px;
}

.card h2 {
    margin-bottom: 10px;
}

.card ul {
    list-style: none;
    padding: 0;
}

.card li {
    margin: 10px 0;
}

.card button {
    padding: 10px 20px;
    border: none;
    background: blue;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

@media(max-width:768px){
    .pricing{
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>
    
<div class="pricing">

    <div class="card">
        <h2>Basic</h2>
        <h3>₹499</h3>
        <ul>
            <li>1 Website</li>
            <li>Email Support</li>
        </ul>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <h2>Pro</h2>
        <h3>₹999</h3>
        <ul>
            <li>5 Websites</li>
            <li>Priority Support</li>
        </ul>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <h2>Premium</h2>
        <h3>₹1999</h3>
        <ul>
            <li>Unlimited Websites</li>
            <li>24/7 Support</li>
        </ul>
        <button>Buy Now</button>
    </div>

</div>
</body>
</html>
