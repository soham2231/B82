<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6. Profile Card</title>
    <style>
.card {
    width: 300px;
    text-align: center;
    margin: 50px auto;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.card img {
    width: 100px;
    border-radius: 30%;
}

button {
    padding: 8px 15px;
    margin-top: 10px;
}
</style>
</head>
<body>
    <body>

<div class="card">
    <img src="pic.jpg.jpeg" alt="Profile" width="100" height="100">
    <h3>Soham Kadam</h3>
    <p>Full Stack Developer</p>
    <button>Contact</button>
</div>
</body>
</html>
