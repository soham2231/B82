<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13. Animated Card Hover Effect</title>
    <style>
body {
    font-family: Arial;
    background: #f2f2f2;
}

.card {
    width: 300px;
    margin: 100px auto;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.card img {
    width: 100%;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

.card:hover img {
    transform: scale(1.1);
}

.card-content {
    padding: 15px;
}
</style>
</head>
<body>
    
<div class="card">
    <img src="https://via.placeholder.com/300x200">
    <div class="card-content">
        <h3>Project Card</h3>
        <p>Hover to see animation effect.</p>
    </div>
</div>
</body>
</html>
