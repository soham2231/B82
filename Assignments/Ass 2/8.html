<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8. Simple Header Bar</title>
    <style>
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: black;
    color: white;
}

.menu {
    display: flex;
    gap: 20px;
}
</style>
</head>
<body>
    <div class="header">
    <div>MyLogo</div>
    <div class="menu">
        <div>Home</div>
        <div>About</div>
        <div>Contact</div>
    </div>
</div>
</body>
</html>
