<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9. Responsive Two Column Layout</title>
    <style>
.container {
    display: flex;
}

.sidebar {
    width: 30%;
    background: lightgray;
    padding: 20px;
}

.content {
    width: 70%;
    padding: 20px;
}

@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }
}
</style>
</head>
<body>
    
<div class="container">
    <div class="sidebar">Sidebar</div>
    <div class="content">Main Content</div>
</div>
</body>
</html>
