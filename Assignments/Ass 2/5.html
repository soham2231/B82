<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5. Simple Button Design</title>
    <style>
button {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

.primary {
    background-color: blue;
    color: white;
}

.secondary {
    background-color: gray;
    color: white;
}

.primary:hover {
    background-color: darkblue;
}

.secondary:hover {
    background-color: black;
}
</style>
</head>
<body>
    
<button class="primary">Primary</button>
<button class="secondary">Secondary</button>
    
</body>
</html>
