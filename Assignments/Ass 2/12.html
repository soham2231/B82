<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12. Responsive Landing Page Section</title>
    <style>
body {
    margin: 0;
    font-family: Arial;
}

.hero {
    height: 100vh;
    background: url("https://via.placeholder.com/1200x800") no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
}

.hero-content {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 10px;
}

.hero h1 {
    font-size: 40px;
}

.hero button {
    padding: 10px 20px;
    border: none;
    background: orange;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

@media(max-width:768px){
    .hero h1{
        font-size: 25px;
    }
}
</style>
</head>
<body>
    <div class="hero">
    <div class="hero-content">
        <h1>Welcome to My Website</h1>
        <p>Learn Full Stack Development with practical projects.</p>
        <button>Get Started</button>
    </div>
</div>
</body>
</html>
