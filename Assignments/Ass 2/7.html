<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7. Vertical Navigation Menu</title>
    <style>
.menu {
    width: 200px;
}

.menu a {
    display: block;
    padding: 10px;
    background: lightgray;
    text-decoration: none;
    color: black;
}

.menu a:hover {
    background: gray;
    color: white;
}
</style>
</head>
<body>
    <div class="menu">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</div>
</body>
</html>
