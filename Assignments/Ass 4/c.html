<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment 3: Responsive Image Gallery</title>
    <style>
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
        padding: 20px;
      }

      .gallery img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h2>Responsive Image Gallery</h2>

    <div class="gallery">
      <img src="Assests/1.jpg" />
      <img src="Assests/2.jpg" />
      <img src="Assests/3.jpg" />
      <img src="Assests/4.jpg" />
      <img src="Assests/5.jpg" />
      <img src="Assests/6.jpg" />
    </div>
  </body>
</html>
