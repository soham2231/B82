<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marks Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      body {
        background-color: #f8f9fa;
      }
      h1 {
        color: #007bff;
      }
      #result {
        width: 100%;
        height: 150px;
        margin-top: 20px;
        padding: 10px;
        border: 1px solid #ced4da;
        border-radius: 4px;
        background-color: #ffffff;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Marks Calculator</h1>
    <label for="markInput">Enter Your Marks</label>
    <input type="number" id="markInput" />
    <button id="add" class="btn btn-primary" onclick="addMark()">
      Add Mark
    </button>
    <button id="calculate" class="btn btn-primary" onclick="calculate()">
      Calculate
    </button>
    <button id="reset" class="btn btn-primary" onclick="reset()">Reset</button>
    <br />
    <textarea name="res" id="result">Results will appear here...</textarea>

    <script src="m.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
