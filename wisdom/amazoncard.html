<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Amazon Product Card</title>

    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f3f3f3;
      }

      .product-card {
        width: 250px;
        background: white;
        padding: 15px;
        border-radius: 8px;
        transition: 0.3s;
      }

      .product-card:hover {
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .product-img {
        height: 200px;
        object-fit: contain;
      }

      .price {
        color: #b12704;
        font-size: 20px;
        font-weight: bold;
      }

      .rating {
        color: #ffa41c;
      }
    </style>
  </head>

  <body>
    <div class="container mt-5">
      <div class="product-card">
        <img
          src="https://m.media-amazon.com/images/I/61L5QgPvgqL._SX679_.jpg"
          class="img-fluid product-img"
        />

        <h6 class="mt-3">Apple iPhone 14 (128 GB) - Midnight</h6>

        <div class="rating">★★★★☆ (12,345)</div>

        <p class="price">₹59,999</p>

        <button class="btn btn-warning w-100">Add to Cart</button>
      </div>
    </div>
  </body>
</html>
